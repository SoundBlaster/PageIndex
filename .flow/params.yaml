# .flow/params.yaml
# Project-specific Flow configuration for the local PageIndex workspace.

project:
  name: PageIndex
  description: Local fork of PageIndex for reasoning-based document indexing and retrieval over PDF and Markdown files.
  language: Python
  package_manager: pip
  default_branch: main

verify:
  tests: .venv/bin/python run_pageindex.py --md_path README.md --if-add-node-summary no --if-add-doc-description no --if-add-node-text no
  lint: .venv/bin/python -m py_compile run_pageindex.py pageindex/__init__.py pageindex/page_index.py pageindex/page_index_md.py pageindex/utils.py scripts/index_markdown_directory.py

structure:
  source: pageindex/
  tests: tests/
